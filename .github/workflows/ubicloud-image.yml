name: Build Ubicloud Image
run-name: ${{ inputs.image_version }} - ${{ inputs.image_types }}
# GitHub Action port from Azure Pipelines version
# https://github.com/actions/runner-images/blob/main/images.CI/linux-and-win/azure-pipelines/image-generation.yml

on:
  workflow_dispatch:
    inputs:
      image_types:
        description: "Comma-separated list of image types to build"
        required: true
        default: ubuntu-22.04,ubuntu-22.04.arm64,ubuntu-22.04.gpu,ubuntu-24.04,ubuntu-24.04.arm64
        type: string
      image_version:
        description: "Image version in semver format. You can get current version from the README.md file"
        required: true
        type: string
      build_image:
        description: "Build image"
        default: true
        type: boolean
      convert_image:
        description: "Convert image to VHD"
        default: true
        type: boolean
      upload_image:
        description: "Upload image to MinIO cluster"
        default: true
        type: boolean

concurrency: "${{ inputs.image_types }}-${{ inputs.image_version }}"

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: "Germany West Central"
  RUN_VALIDATION_FLAG: "true"

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set matrix
        id: set-matrix
        run: |
          selected_images="$(echo '${{ inputs.image_types }}' | jq -R -c 'split(",")')"
          images="$(cat .github/images.json)"
          matrix="$(echo $images | jq --argjson selecteds "$selected_images" '{include: .include | map(select(.image_type | IN($selecteds[])))}')"
          echo "matrix<<EOF"$'\n'"$matrix"$'\n'EOF >> "$GITHUB_OUTPUT"
  upload:
    if: ${{ inputs.upload_image && always() }}
    needs: [generate-matrix]
    name: upload ${{ matrix.image_type }}
    runs-on: ubicloud-standard-16
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    env:
      MANAGED_IMAGE_NAME: "${{ matrix.image_type  }}-${{inputs.image_version }}"
      MC_HOST_ubicloud: ${{ secrets.MINIO_CONNECTION_STRING }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install MinIO client
        run: |
          curl https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          sudo mv mc /usr/bin/mc
          sudo chmod +x /usr/bin/mc
          mc --version

      - name: Set MinIO root certificates
        run: |
          mkdir -p ~/.mc/certs/CAs
          cat <<EOT > ~/.mc/certs/CAs/ubicloud_images_blob_storage_certs.crt
          ${{ secrets.MINIO_ROOT_CERTIFICATES }}
          EOT
      
      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone for R2
        run: |
          rclone config create ubicloud-image s3 \
            provider Cloudflare \
            access_key_id ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }} \
            secret_access_key ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }} \
            endpoint ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}

      - name: Download the RAW image from MinIO
        run: |
          mc cp ubicloud/ubicloud-images/${{ matrix.image_name }}-${{ inputs.image_version }}.raw ${{ matrix.image_name }}-${{ inputs.image_version }}.raw
          mc cp ubicloud/ubicloud-images/${{ matrix.image_name }}-${{ inputs.image_version }}.raw.sha256 ${{ matrix.image_name }}-${{ inputs.image_version }}.raw.sha256
      - name: Upload image to R2 with rclone
        run: |
          rclone copy ${{ matrix.image_name }}-${{inputs.image_version }}.raw ubicloud-image:${{ matrix.image_name }}-${{inputs.image_version }}.raw
          rclone copy ${{ matrix.image_name }}-${{inputs.image_version }}.raw.sha256 ubicloud-image:${{ matrix.image_name }}-${{inputs.image_version }}.raw.sha256
